<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Madani Dates Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>

{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f6f8;
}

/ HEADER /

header{
background:linear-gradient(135deg,#0f9d58,#06341a);
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

header h1{
margin:0;
font-size:20px;
}

.copy-btn{
background:white;
color:#0f9d58;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/ GRID /

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

/ CARD /

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.icon{
font-size:40px;
margin-bottom:10px;
}

.title{
font-size:16px;
font-weight:bold;
}

/ FOOTER */

footer{
text-align:center;
padding:20px;
font-size:13px;
opacity:0.6;
}

</style>

</head>

<body>

<header>

<h1>Madani Dates Admin</h1>

<button class="copy-btn" onclick="copyCode()">
Copy Full Code
</button>

</header>


<div class="container">

<div class="card" onclick="location.href='orders.html'">

<div class="icon">📦</div>

<div class="title">Orders</div>

</div>


<div class="card" onclick="location.href='stock.html'">

<div class="icon">📊</div>

<div class="title">Stock Control</div>

</div>


<div class="card" onclick="location.href='add-item.html'">

<div class="icon">➕</div>

<div class="title">Add Product</div>

</div>


<div class="card" onclick="location.href='messages.html'">

<div class="icon">💬</div>

<div class="title">Messages</div>

</div>


</body>
</html>
