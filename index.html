<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Madani Dates Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#f4f6f8,#e9f5ef);
}

/* HEADER */

header{
background:linear-gradient(135deg,#0f9d58,#06341a);
color:white;
padding:20px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 18px rgba(0,0,0,0.2);
}

header h1{
margin:0;
font-size:22px;
letter-spacing:1px;
}

/* GRID */

.container{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

/* CARD */

.card{
background:white;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
cursor:pointer;
transition:0.35s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:6px;
background:#0f9d58;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 18px 40px rgba(0,0,0,0.25);
}

/* ICON */

.icon{
font-size:45px;
margin-bottom:12px;
}

/* TITLE */

.title{
font-size:17px;
font-weight:600;
color:#333;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
font-size:13px;
opacity:0.6;
}

/* MOBILE */

@media(max-width:600px){

.container{
padding:25px;
gap:20px;
}

.card{
padding:30px;
}

.icon{
font-size:40px;
}

}

</style>

</head>

<body>

<header>

<h1>Madani Dates Admin</h1>

</header>

<div class="container">

<div class="card" onclick="location.href='orders.html'">

<div class="icon">📦</div>

<div class="title">Orders</div>

</div>

<div class="card" onclick="location.href='stock.html'">

<div class="icon">📊</div>

<div class="title">Stock Control</div>

</div>

<div class="card" onclick="location.href='add-item.html'">

<div class="icon">➕</div>

<div class="title">Add Product</div>

</div>

<div class="card" onclick="location.href='messages.html'">

<div class="icon">💬</div>

<div class="title">Messages</div>

</div>

</div>

<footer>
Madani Dates Admin Panel
</footer>

</body>
</html>
